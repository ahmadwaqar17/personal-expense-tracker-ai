{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#1e3a5f',
            accent: '#10b981',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  {% if request.session.logged_in %}
  <nav class="sticky top-0 z-30 border-b border-slate-200/80 bg-slate-900/95 text-white shadow-lg backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <a href="{% url 'dashboard' %}" class="flex items-center gap-2 font-semibold tracking-tight">
        <span class="flex h-9 w-9 items-center justify-center rounded-full bg-emerald-500/20 text-lg font-bold text-emerald-300">A</span>
        <span class="text-base sm:text-lg">AI Expense Tracker</span>
      </a>
      <button type="button" class="inline-flex items-center rounded-full p-2 text-slate-200 transition hover:bg-white/10 hover:text-white sm:hidden" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobileMenu">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="hidden items-center gap-2 text-sm font-medium sm:flex">
        <a href="{% url 'dashboard' %}" class="rounded-full px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Dashboard</a>
        <a href="{% url 'upload_receipt' %}" class="rounded-full px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Upload</a>
        <a href="{% url 'manual_entry' %}" class="rounded-full px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Add</a>
        <a href="{% url 'expense_list' %}" class="rounded-full px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Expenses</a>
        <a href="{% url 'logout' %}" class="rounded-full bg-red-500 px-3 py-2 text-white transition hover:bg-red-600">Logout</a>
      </div>
    </div>
    <div id="mobileMenu" class="hidden border-t border-white/10 bg-slate-900/95 px-4 pb-4 sm:hidden">
      <div class="space-y-2 pt-3 text-sm">
        <a href="{% url 'dashboard' %}" class="block rounded-lg px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Dashboard</a>
        <a href="{% url 'upload_receipt' %}" class="block rounded-lg px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Upload</a>
        <a href="{% url 'manual_entry' %}" class="block rounded-lg px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Add</a>
        <a href="{% url 'expense_list' %}" class="block rounded-lg px-3 py-2 transition hover:bg-white/10 hover:text-emerald-300">Expenses</a>
        <a href="{% url 'logout' %}" class="block rounded-lg bg-red-500 px-3 py-2 text-center text-white transition hover:bg-red-600">Logout</a>
      </div>
    </div>
  </nav>
  <script>
    (function() {
      var btn = document.querySelector('nav button');
      var menu = document.getElementById('mobileMenu');
      if (btn && menu) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var isHidden = menu.classList.toggle('hidden');
          btn.setAttribute('aria-expanded', String(!isHidden));
        });
        menu.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() {
            menu.classList.add('hidden');
            btn.setAttribute('aria-expanded', 'false');
          });
        });
      }
    })();
  </script>
  {% endif %}
  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 lg:py-8">
    {% if messages %}
    {% for message in messages %}
    <div class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700 shadow-sm">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
