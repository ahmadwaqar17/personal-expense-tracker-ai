{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0f172a',
            accent: '#10b981',
            card: 'rgba(255,255,255,0.7)',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #ecfdf5 100%);
      background-attachment: fixed;
    }
    .glass {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .glass-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    .stat-glow-1 { box-shadow: 0 4px 20px rgba(16,185,129,0.15); }
    .stat-glow-2 { box-shadow: 0 4px 20px rgba(59,130,246,0.15); }
    .stat-glow-3 { box-shadow: 0 4px 20px rgba(139,92,246,0.15); }
    @media (max-width: 640px) {
      .glass-card { background: rgba(255,255,255,0.92); }
    }
    nav a.active { color: #10b981; }
  </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">
  {% if request.session.logged_in %}
  <nav class="sticky top-0 z-30 border-b border-white/20 bg-slate-900/90 text-white shadow-lg backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6">
      <a href="{% url 'dashboard' %}" class="flex items-center gap-2.5 font-bold tracking-tight">
        <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 text-sm font-bold text-white shadow-lg">$</span>
        <span class="text-base sm:text-lg">ExpenseTracker</span>
      </a>
      <button type="button" class="inline-flex items-center rounded-xl p-2.5 text-slate-300 transition hover:bg-white/10 hover:text-white sm:hidden" id="menuBtn">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="hidden items-center gap-1 text-sm font-medium sm:flex">
        <a href="{% url 'dashboard' %}" class="rounded-xl px-3.5 py-2 transition hover:bg-white/10 hover:text-emerald-400">Dashboard</a>
        <a href="{% url 'upload_receipt' %}" class="rounded-xl px-3.5 py-2 transition hover:bg-white/10 hover:text-emerald-400">Upload</a>
        <a href="{% url 'manual_entry' %}" class="rounded-xl px-3.5 py-2 transition hover:bg-white/10 hover:text-emerald-400">Add</a>
        <a href="{% url 'expense_list' %}" class="rounded-xl px-3.5 py-2 transition hover:bg-white/10 hover:text-emerald-400">Expenses</a>
        <a href="{% url 'logout' %}" class="ml-2 rounded-xl bg-gradient-to-r from-red-500 to-red-600 px-4 py-2 text-white shadow-lg shadow-red-500/20 transition hover:from-red-600 hover:to-red-700">Logout</a>
      </div>
    </div>
    <div id="mobileMenu" class="hidden border-t border-white/10 px-4 pb-4">
      <div class="space-y-1 pt-3 text-sm">
        <a href="{% url 'dashboard' %}" class="block rounded-xl px-3 py-2.5 transition hover:bg-white/10 hover:text-emerald-400">Dashboard</a>
        <a href="{% url 'upload_receipt' %}" class="block rounded-xl px-3 py-2.5 transition hover:bg-white/10 hover:text-emerald-400">Upload</a>
        <a href="{% url 'manual_entry' %}" class="block rounded-xl px-3 py-2.5 transition hover:bg-white/10 hover:text-emerald-400">Add</a>
        <a href="{% url 'expense_list' %}" class="block rounded-xl px-3 py-2.5 transition hover:bg-white/10 hover:text-emerald-400">Expenses</a>
        <a href="{% url 'logout' %}" class="mt-2 block rounded-xl bg-gradient-to-r from-red-500 to-red-600 px-3 py-2.5 text-center text-white">Logout</a>
      </div>
    </div>
  </nav>
  <script>
    document.getElementById('menuBtn')?.addEventListener('click', function() {
      document.getElementById('mobileMenu')?.classList.toggle('hidden');
    });
  </script>
  {% endif %}
  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:py-8">
    {% if messages %}
    {% for message in messages %}
    <div class="mb-4 rounded-xl border border-emerald-200/50 bg-emerald-50/80 px-4 py-3 text-sm text-emerald-700 shadow-sm backdrop-blur">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
